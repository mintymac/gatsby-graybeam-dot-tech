<!DOCTYPE html><html><head><title>blog-framework-macropad-rgb</title>
<style>body{background:#111;color:#fbbf24;font-family:monospace;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px;margin-top:16px}.card{background:#1a1a2e;border:2px solid #333;border-radius:8px;overflow:hidden;cursor:pointer}.card:hover{border-color:#555}.card.selected{border-color:#fbbf24;box-shadow:0 0 20px rgba(251,191,36,0.15)}.card img{width:100%;display:block}.card .label{padding:8px 12px;font-size:14px;display:flex;justify-content:space-between}.pick-btn{background:transparent;color:#666;border:1px solid #444;border-radius:4px;padding:3px 10px;font-family:monospace;font-size:11px;cursor:pointer}.pick-btn:hover{color:#fbbf24;border-color:#fbbf24}</style></head><body>
<h1 style="font-size:18px;letter-spacing:4px;text-transform:uppercase;border-bottom:1px solid #333;padding-bottom:8px">blog-framework-macropad-rgb</h1>
<div class="grid"><div class="card" data-name="blog-framework-macropad-rgb_v1.png" data-label="v1" onclick="selectCard(this)"><img src="blog-framework-macropad-rgb_v1.png"><div class="label">v1<button class="pick-btn" onclick="event.stopPropagation();pickCard(this.closest('.card'))">Select</button></div></div>
<div class="card" data-name="blog-framework-macropad-rgb_v2.png" data-label="v2" onclick="selectCard(this)"><img src="blog-framework-macropad-rgb_v2.png"><div class="label">v2<button class="pick-btn" onclick="event.stopPropagation();pickCard(this.closest('.card'))">Select</button></div></div>
<div class="card" data-name="blog-framework-macropad-rgb_v3.png" data-label="v3" onclick="selectCard(this)"><img src="blog-framework-macropad-rgb_v3.png"><div class="label">v3<button class="pick-btn" onclick="event.stopPropagation();pickCard(this.closest('.card'))">Select</button></div></div>
</div>
<script>function selectCard(c){document.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));c.classList.add('selected')}function pickCard(c){selectCard(c)}</script>
</body></html>
